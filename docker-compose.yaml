services:
  catalouge:
    build: ./catalouge
    image: catalouge:1.0.0
    container_name: catalouge
    depends_on:
      - mongodb
  mongodb:
    build: ./mongodb
    image: mongodb:1.0.0
    container_name: mongodb
  frontend:
    build: ./frontend
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalouge